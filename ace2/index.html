<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#020709">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="/icon-180.png">
<title>ACE // Command</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<canvas id="matrix"></canvas>
<div id="overlay"></div>

<!-- Login gate -->
<div id="login" class="hidden">
  <div class="box">
    <div class="title">ACE <span class="v">2.0</span></div>
    <div class="sub">Platinum Fortune Impact</div>
    <input id="login-input" type="password" placeholder="ACCESS CODE" autocomplete="current-password">
    <button id="login-btn">AUTHENTICATE</button>
    <div id="login-err" class="err"></div>
  </div>
</div>

<div id="app" class="hidden">

  <!-- Corner chrome — no bars, no tabs. Up-next lives here now (top, glanceable). -->
  <div id="chrome">
    <div class="wordmark">ACE <span class="dot-sep">◈</span> <span class="dot-sep">PFI</span></div>
    <div id="upnext" class="hidden"></div>
    <div id="chrome-right">
      <div id="clock">--:--</div>
      <button id="chat-toggle" class="icon-btn" title="Conversation" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.4 8.4 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.4 8.4 0 0 1 21 11.5z"/>
        </svg>
      </button>
      <div id="link-dot" title="Link"></div>
    </div>
  </div>

  <!-- The stage: the orb is the star. Ace materializes #cards to the side slots. -->
  <div id="stage">
    <div id="orb-wrap">
      <canvas id="orb-canvas" width="640" height="640"></canvas>
      <div id="orb-state">[ IDLE ]</div>
    </div>
    <div id="cards-left" class="card-slot"></div>
    <div id="cards" class="card-slot"></div>
  </div>

  <!-- Conversation lives in a side window you toggle on/off (chat-toggle in chrome). -->
  <aside id="chat-panel">
    <div id="chat-head"><span>CONVERSATION</span><button id="chat-close" title="Close">✕</button></div>
    <div id="messages"></div>
  </aside>

  <div id="quick">
    <button class="qa" data-msg="Give me my morning brief.">Morning brief</button>
    <button class="qa" data-msg="Show me my calendar and walk me through today.">Today</button>
    <button class="qa" data-msg="Show me my tasks and tell me what matters most.">Tasks</button>
  </div>

  <div id="input-bar">
    <button id="mic-btn" class="icon-btn" title="Talk to Ace">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/>
      </svg>
    </button>
    <input id="chat-input" type="text" placeholder="Talk to Ace…" autocomplete="off">
    <button id="voice-toggle" class="icon-btn" title="Spoken replies on/off" aria-pressed="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/>
      </svg>
    </button>
    <button id="send-btn" class="icon-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<script src="/app.js"></script>
</body>
</html>
